<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        
        // Toggle function for Dark Mode
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // Function to add the idea
        function addIdea() {
            const nameInput = document.getElementById('nameInput');
            const ideaInput = document.getElementById('ideaInput');
            const name = nameInput.value.trim();
            const idea = ideaInput.value.trim();
            const container = document.getElementById('collection');

            if (name && idea) {
                const div = document.createElement('div');
                div.className = "p-4 mb-4 bg-gray-50 dark:bg-gray-700 rounded-lg border border-gray-200 dark:border-gray-600 animate-in fade-in slide-in-from-top-2 duration-300";
                div.innerHTML = `<div class="flex justify-between items-start"><div><p class="font-bold text-blue-600 dark:text-blue-400 text-sm uppercase tracking-wider">${name}</p><p class="text-gray-700 dark:text-gray-300 mt-1">${idea}</p></div><button onclick="removeIdea(this)" class="text-gray-400 hover:text-red-500 transition-colors">✕</button></div>`;
                container.prepend(div);
                
                // Clear inputs
                nameInput.value = '';
                ideaInput.value = '';
                nameInput.focus();

                updateClearButtonVisibility();
            } else {
                alert("Please provide both your name and an idea.");
            }
        }

        function removeIdea(btn) {
            btn.closest('div.p-4').remove();
            updateClearButtonVisibility();
        }

        function clearAll() {
            if (confirm("Are you sure you want to clear all ideas?")) {
                document.getElementById('collection').innerHTML = '';
                updateClearButtonVisibility();
            }
        }

        function updateClearButtonVisibility() {
            const container = document.getElementById('collection');
            const clearBtn = document.getElementById('clearBtn');
            if (container.children.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .animate-in {
                animation: enter 0.3s ease-out;
            }
            @keyframes enter {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300 min-h-screen">

    <header class="flex justify-between items-center p-6 bg-white dark:bg-gray-800 shadow-md sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">GROUP IDEA BOARD</h1>
        <button onclick="toggleTheme()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition flex items-center gap-2">
            🌓 Theme
        </button>
    </header>

    <main class="max-w-2xl mx-auto mt-10 p-4 pb-20">
        <section class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-semibold mb-6 text-gray-800 dark:text-white">Submit an Idea</h2>
            <div class="space-y-4">
                <input id="nameInput" type="text" placeholder="Your name" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <textarea id="ideaInput" placeholder="What is your idea?" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none h-24 transition-all"></textarea>
                <button onclick="addIdea()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 active:scale-[0.98] transition-all">Add Idea</button>
            </div>
        </section>

        <section class="mt-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Ideas Collection</h2>
                <button id="clearBtn" onclick="clearAll()" class="hidden text-sm font-medium text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 transition-colors">Clear All</button>
            </div>
            <div id="collection" class="space-y-4">
                <!-- Ideas will appear here -->
            </div>
        </section>
    </main>
</body>
</html>
